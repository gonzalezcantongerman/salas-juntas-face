<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumen Puestos · FACE CDMX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#3F4FA3;--dark:#2B3673;--light:#8B98D9;
  --green:#1A9E55;--amber:#D97706;--red:#D64545;
  --bg:#F4F6FB;--card:#fff;--border:#E3E6F0;
  --ink:#111418;--muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;display:flex;flex-direction:column;
}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,var(--dark) 0%,var(--navy) 100%);
  padding:16px 28px;display:flex;align-items:center;
  justify-content:space-between;box-shadow:0 2px 20px rgba(43,54,115,.25);flex-shrink:0;
}
.hdr-left{display:flex;align-items:center;gap:16px;}
.logo-plate{background:#fff;border-radius:10px;padding:7px 14px;
  display:flex;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.08);}
.logo-plate img{height:24px;display:block;}

/* Module switcher */
.mod-sw{position:relative;}
.mod-sw-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  padding:7px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;
}
.mod-sw-btn .arr{font-size:10px;transition:transform .2s;}
.mod-sw-btn.open .arr{transform:rotate(180deg);}
.mod-sw-menu{
  position:absolute;top:calc(100% + 8px);left:0;min-width:210px;
  background:#fff;border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 24px rgba(43,54,115,.15);overflow:hidden;display:none;z-index:200;
}
.mod-sw-menu.open{display:block;}
.mod-sw-menu a{
  display:flex;align-items:center;gap:10px;padding:11px 16px;
  font-size:13px;font-weight:500;color:var(--ink);text-decoration:none;transition:background .12s;
}
.mod-sw-menu a:hover{background:var(--bg);}
.mod-sw-menu a.cur{background:#EEF1FB;color:var(--dark);font-weight:700;}

/* Clock */
.hdr-clock{text-align:right;color:#fff;}
.hdr-clock .time{font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1;}
.hdr-clock .date{font-size:12px;font-weight:400;color:rgba(255,255,255,.65);margin-top:4px;}

/* ── MAIN GRID ── */
main{flex:1;padding:20px 24px 16px;}
.section-title{
  font-size:14px;font-weight:700;color:var(--dark);margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-title .dot{width:10px;height:10px;border-radius:50%;}

.desks-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;margin-bottom:28px;
}

/* ── DESK CARD ── */
.desk-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:14px 16px;box-shadow:0 2px 8px rgba(43,54,115,.05);
  display:flex;flex-direction:column;gap:6px;transition:box-shadow .15s;
  position:relative;overflow:hidden;
}
.desk-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--border);border-radius:14px 14px 0 0;
}
.desk-card.state-free::before{background:var(--green);}
.desk-card.state-busy::before{background:linear-gradient(90deg,var(--navy),var(--dark));}
.desk-card.state-soon::before{background:var(--amber);}
.desk-card.state-off::before{background:#C0C0C0;}

.desk-number{font-size:13px;font-weight:800;color:var(--dark);}
.desk-status{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;
  width:fit-content;
}
.status-free{background:#ECFDF5;color:var(--green);}
.status-busy{background:#EEF1FB;color:var(--navy);}
.status-soon{background:#FEF3C7;color:var(--amber);}
.status-off{background:#F3F4F6;color:#9CA3AF;}

.desk-advisor{font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.desk-time{font-size:11px;color:var(--muted);}
.desk-next{font-size:11px;color:var(--muted);margin-top:2px;}

/* Pulse for "en uso ahora" */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.desk-card.state-busy .desk-status{animation:pulse 2.5s infinite;}

/* ── FOOTER ── */
footer{
  padding:10px 24px 14px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
}
.footer-refresh{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.refresh-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
.footer-link{font-size:12px;color:var(--navy);text-decoration:none;font-weight:600;}
.footer-link:hover{text-decoration:underline;}

/* ── LOADING ── */
#loadingOverlay{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;z-index:99;
}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingOverlay p{font-size:14px;color:var(--muted);}

@media(max-width:600px){
  .desks-grid{grid-template-columns:repeat(2,1fr);}
  .hdr-clock .time{font-size:24px;}
}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner"></div>
  <p>Cargando puestos de hoy…</p>
</div>

<header>
  <div class="hdr-left">
    <div class="logo-plate"><img src="assets/face-logo-color.png" alt="FACE"></div>
    <div class="mod-sw" id="modSw">
      <button class="mod-sw-btn" id="modSwBtn" onclick="toggleModSw()">
        🗂 Puestos de Trabajo <span class="arr">▾</span>
      </button>
      <div class="mod-sw-menu" id="modSwMenu">
        <a href="index.html">🏢 Salas de Juntas</a>
        <a href="resumen.html">📺 Resumen Salas</a>
        <a href="puestos.html">🗂 Puestos de Trabajo</a>
        <a href="resumen-puestos.html" class="cur">📺 Resumen Puestos <span style="font-size:10px;background:var(--navy);color:#fff;padding:2px 7px;border-radius:20px;margin-left:auto;">aquí</span></a>
      </div>
    </div>
  </div>
  <div class="hdr-clock">
    <div class="time" id="clock">--:--</div>
    <div class="date" id="dateLabel">--</div>
  </div>
</header>

<main id="mainWrap">
  <div class="section-title" id="secTitleA">
    <div class="dot" style="background:var(--navy)"></div>
    Bloque A — Puestos #1 al #8
  </div>
  <div class="desks-grid" id="gridA"></div>

  <div class="section-title" id="secTitleB">
    <div class="dot" style="background:var(--light)"></div>
    Bloque B — Puestos #9 al #16
  </div>
  <div class="desks-grid" id="gridB"></div>
</main>

<footer>
  <div class="footer-refresh">
    <div class="refresh-dot"></div>
    <span id="refreshLabel">Actualizando cada 5 min</span>
  </div>
  <div style="display:flex;gap:16px;align-items:center;">
    <a class="footer-link" href="puestos.html">← Ir a Puestos de Trabajo</a>
    <a class="footer-link" href="resumen.html">Resumen Salas ↗</a>
  </div>
</footer>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzn97PY2IowALy3LB4SF9yjwREPiwt8SCYk_k53IYB3Exxq1tLakSFatu8U0PdqM6ORbA/exec";

const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAYS   = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

const DESK_NAMES = {
  P1:'Puesto #1', P2:'Puesto #2',  P3:'Puesto #3',  P4:'Puesto #4',
  P5:'Puesto #5', P6:'Puesto #6',  P7:'Puesto #7',  P8:'Puesto #8',
  P9:'Puesto #9', P10:'Puesto #10',P11:'Puesto #11', P12:'Puesto #12',
  P13:'Puesto #13',P14:'Puesto #14',P15:'Puesto #15',P16:'Puesto #16',
};

let bookings    = [];
let puestosConf = [];
let lastLoad    = new Date();

// ── Clock ──────────────────────────────────────────────────────────────
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=
    `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  document.getElementById('dateLabel').textContent=
    `${DAYS[now.getDay()]}, ${now.getDate()} de ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock,1000);
updateClock();

function pad2(n){ return String(n).padStart(2,'0'); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function shortName(n){ const p=n.trim().split(/\s+/); return p.length===1?p[0]:p[0]+' '+p[1].charAt(0)+'.'; }

// ── Module switcher ────────────────────────────────────────────────────
function toggleModSw(){
  document.getElementById('modSwBtn').classList.toggle('open');
  document.getElementById('modSwMenu').classList.toggle('open');
}
document.addEventListener('click',e=>{
  if(!document.getElementById('modSw').contains(e.target)){
    document.getElementById('modSwBtn').classList.remove('open');
    document.getElementById('modSwMenu').classList.remove('open');
  }
});

// ── Fetch ─────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const [bRes, pRes] = await Promise.all([
      fetch(`${API_URL}?action=reservasPuestos&date=${todayStr()}`),
      fetch(`${API_URL}?action=puestos`)
    ]);
    const bData = await bRes.json();
    const pData = await pRes.json();
    if(Array.isArray(bData)) bookings=bData;
    if(Array.isArray(pData)) puestosConf=pData;
  }catch(e){
    bookings=[]; puestosConf=[];
  }
  render();
  document.getElementById('loadingOverlay').style.display='none';
  lastLoad=new Date();
}

// ── Render ─────────────────────────────────────────────────────────────
function render(){
  const now   = new Date();
  const hour  = now.getHours();
  const gridA = document.getElementById('gridA');
  const gridB = document.getElementById('gridB');
  gridA.innerHTML=''; gridB.innerHTML='';

  const allIds = ['P1','P2','P3','P4','P5','P6','P7','P8','P9','P10','P11','P12','P13','P14','P15','P16'];

  allIds.forEach(id=>{
    const pConf = puestosConf.find(p=>p.id===id);
    const disponible = pConf ? pConf.disponible : true;
    const nombre = pConf ? pConf.nombre : DESK_NAMES[id];

    // Current booking (active right now)
    const current = bookings.find(b=>{
      if(b.puesto!==id) return false;
      const s=parseInt(b.time.split(':')[0],10);
      return hour>=s&&hour<s+(b.duration||1);
    });

    // Next upcoming booking today (after now)
    const upcoming = bookings
      .filter(b=>b.puesto===id&&parseInt(b.time.split(':')[0],10)>hour)
      .sort((a,b2)=>a.time.localeCompare(b2.time))[0];

    // Determine state
    let state='free';
    if(!disponible) state='off';
    else if(current)  state='busy';
    else if(upcoming){
      const diffH=parseInt(upcoming.time.split(':')[0],10)-hour;
      if(diffH<=1) state='soon';
    }

    const card=document.createElement('div');
    card.className=`desk-card state-${state}`;

    // Number + status pill
    let pillClass='status-free', pillText='Disponible';
    if(state==='off')   { pillClass='status-off';  pillText='No disponible'; }
    if(state==='busy')  { pillClass='status-busy'; pillText='En uso'; }
    if(state==='soon')  { pillClass='status-soon'; pillText='Próxima <1h'; }

    let html=`
      <div class="desk-number">${nombre}</div>
      <div class="desk-status ${pillClass}">${pillText}</div>
    `;

    if(state==='busy'&&current){
      const s=parseInt(current.time.split(':')[0],10), dur=current.duration||1;
      html+=`
        <div class="desk-advisor">${shortName(current.advisor)}</div>
        <div class="desk-time">${pad2(s)}:00 – ${pad2(s+dur)}:00</div>
      `;
      if(upcoming){
        const ns=parseInt(upcoming.time.split(':')[0],10), nd=upcoming.duration||1;
        html+=`<div class="desk-next">Después: ${shortName(upcoming.advisor)} ${pad2(ns)}:00–${pad2(ns+nd)}:00</div>`;
      }
    } else if(state==='soon'&&upcoming){
      const ns=parseInt(upcoming.time.split(':')[0],10), nd=upcoming.duration||1;
      html+=`
        <div class="desk-advisor">${shortName(upcoming.advisor)}</div>
        <div class="desk-time">Desde ${pad2(ns)}:00 hasta ${pad2(ns+nd)}:00</div>
      `;
    } else if(state==='free'&&upcoming){
      const ns=parseInt(upcoming.time.split(':')[0],10);
      html+=`<div class="desk-next">Próxima: ${pad2(ns)}:00</div>`;
    }

    card.innerHTML=html;

    const num=parseInt(id.replace('P',''),10);
    (num<=8?gridA:gridB).appendChild(card);
  });
}

// ── Refresh ───────────────────────────────────────────────────────────
setInterval(()=>{
  const diff=Math.round((new Date()-lastLoad)/60000);
  document.getElementById('refreshLabel').textContent=
    diff===0?'Actualizado hace un momento':`Actualizado hace ${diff} min`;
},30000);

setInterval(()=>loadData(), 5*60*1000);  // refetch data every 5 min
setInterval(()=>render(),   60*1000);    // re-render every 1 min (clock moves)

// ── Init ──────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
