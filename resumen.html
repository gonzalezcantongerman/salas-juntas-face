<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FACE – Resumen del día</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#3F4FA3;--light:#8B98D9;--dark:#2B3673;
  --green:#1A9E55;--red:#D64545;--amber:#D97706;
  --bg:#0d1333;--card:#182060;--border:rgba(139,152,217,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100vh}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
header{
  background:linear-gradient(135deg,var(--dark) 0%,var(--navy) 100%);
  padding:14px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.1);
  box-shadow:0 2px 20px rgba(0,0,0,.4);
}
.logo-plate{background:#fff;border-radius:10px;padding:7px 14px;
  display:flex;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.15);flex-shrink:0;}
.logo-plate img{height:24px;display:block;}
.page-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.85);}
.spacer{flex:1}
.date-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;
  white-space:nowrap;text-transform:capitalize;}

/* Module switcher */
.mod-sw{position:relative;flex-shrink:0;}
.mod-sw-btn{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;
  font-family:'Inter',sans-serif;transition:background .15s;
}
.mod-sw-btn:hover{background:rgba(255,255,255,.2);}
.mod-sw-menu{
  position:absolute;top:calc(100% + 8px);right:0;background:#1a2660;
  border:1px solid var(--border);border-radius:10px;overflow:hidden;min-width:220px;
  display:none;z-index:600;box-shadow:0 8px 24px rgba(0,0,0,.35);
}
.mod-sw-menu.open{display:block;}
.mod-sw-item{display:block;width:100%;padding:11px 16px;text-align:left;
  border:none;background:none;font-size:13px;cursor:pointer;color:rgba(255,255,255,.7);
  font-family:'Inter',sans-serif;transition:background .12s;}
.mod-sw-item:hover{background:rgba(255,255,255,.08);}
.mod-sw-item.active{color:#fff;font-weight:700;background:rgba(63,79,163,.3);}

.refresh-info{font-size:11.5px;color:rgba(255,255,255,.45);white-space:nowrap;}
.back-btn{
  background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.25);
  border-radius:7px;padding:6px 12px;font-size:12px;text-decoration:none;white-space:nowrap;
  font-family:'Inter',sans-serif;font-weight:600;transition:background .15s;
}
.back-btn:hover{background:rgba(255,255,255,.2);}

/* ── SALAS ──────────────────────────────────────────────────────────────── */
.salas-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px;max-width:1200px;margin:0 auto;}
@media(max-width:680px){.salas-grid{grid-template-columns:1fr;padding:16px;}}
.sala-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.3);}
.sala-header{
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.sala-name{font-size:16px;font-weight:800;letter-spacing:.3px;}
.sala-sub{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;}
.sala-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.pill-free{background:rgba(26,158,85,.2);color:#5ee68f;border:1px solid rgba(26,158,85,.35);}
.pill-busy{background:rgba(214,69,69,.25);color:#ff8080;border:1px solid rgba(214,69,69,.4);animation:pulse 2s infinite;}
.pill-soon{background:rgba(217,119,6,.2);color:#fbbf24;border:1px solid rgba(217,119,6,.35);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.sala-body{padding:16px 20px;}
.tl-empty{color:rgba(255,255,255,.3);font-style:italic;font-size:13px;padding:8px 0;}
.tl-row{
  display:flex;gap:12px;align-items:flex-start;
  padding:9px 12px;border-radius:8px;margin-bottom:6px;font-size:13px;
}
.tl-row.past{background:rgba(255,255,255,.03);opacity:.55;}
.tl-row.current{background:rgba(214,69,69,.18);border:1px solid rgba(214,69,69,.3);}
.tl-row.upcoming{background:rgba(63,79,163,.18);border:1px solid rgba(63,79,163,.25);}
.tl-time{min-width:96px;font-weight:700;font-size:12px;color:var(--light);}
.tl-row.current .tl-time{color:#ff8080;}
.tl-name{color:#fff;font-weight:500;}
.tl-row.past .tl-name{color:rgba(255,255,255,.5);}

/* ── PUESTOS ────────────────────────────────────────────────────────────── */
.puestos-wrap{padding:24px;max-width:1200px;margin:0 auto;}
.puestos-group{margin-bottom:20px;}
.group-label{font-size:11px;font-weight:700;color:var(--light);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:10px;padding-left:2px;}
.puestos-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:600px){.puestos-row{grid-template-columns:repeat(2,1fr);}}

.puesto-card{
  background:var(--card);border-radius:12px;padding:14px 12px;
  border-left:4px solid var(--border);transition:border-color .3s;
}
.puesto-card.state-free{border-left-color:var(--green);}
.puesto-card.state-busy{border-left-color:var(--red);}
.puesto-card.state-soon{border-left-color:var(--amber);}
.puesto-card.state-past{border-left-color:rgba(139,152,217,.35);opacity:.6;}
.puesto-card.state-off{border-left-color:#444;opacity:.45;}

.p-id{font-size:15px;font-weight:800;color:#fff;margin-bottom:6px;}
.p-pill{
  display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;
  border-radius:20px;margin-bottom:6px;
}
.p-pill.free{background:rgba(26,158,85,.2);color:#5ee68f;border:1px solid rgba(26,158,85,.3);}
.p-pill.busy{background:rgba(214,69,69,.2);color:#ff8080;border:1px solid rgba(214,69,69,.3);}
.p-pill.soon{background:rgba(217,119,6,.2);color:#fbbf24;border:1px solid rgba(217,119,6,.3);}
.p-pill.off{background:rgba(100,100,100,.2);color:#888;border:1px solid #555;}

.p-advisor{font-size:11.5px;color:rgba(255,255,255,.75);margin-top:2px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.p-time{font-size:10.5px;color:rgba(255,255,255,.4);margin-top:2px;}
.p-next{font-size:10.5px;color:rgba(251,191,36,.7);margin-top:3px;}

/* ── LOADING ────────────────────────────────────────────────────────────── */
#loadingR{display:flex;align-items:center;justify-content:center;height:60vh;
  flex-direction:column;gap:14px;color:var(--light);}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo-plate"><img src="assets/face-logo-color.png" alt="FACE Financial Advisors"></div>
  <span class="page-title" id="pageTitle">Resumen del día</span>
  <div class="date-badge" id="dateBadge">—</div>
  <div class="spacer"></div>
  <div class="mod-sw" id="modSw">
    <button class="mod-sw-btn" onclick="toggleModSw()">
      <span id="modSwLabel">🏢 Salas de Juntas</span> <span>▾</span>
    </button>
    <div class="mod-sw-menu" id="modSwMenu">
      <button class="mod-sw-item active" id="msItemSalas" onclick="switchMode('salas')">🏢 Salas de Juntas</button>
      <button class="mod-sw-item" id="msItemPuestos" onclick="switchMode('puestos')">🗂 Puestos de Trabajo</button>
    </div>
  </div>
  <span class="refresh-info" id="refreshInfo">Actualizando…</span>
  <a href="index.html" class="back-btn">← Reservaciones</a>
</header>

<div id="loadingR">
  <div class="spin"></div>
  <span>Cargando…</span>
</div>

<!-- SALAS -->
<div id="viewSalas" style="display:none">
  <div class="salas-grid" id="salasGrid"></div>
</div>

<!-- PUESTOS -->
<div id="viewPuestos" style="display:none">
  <div class="puestos-wrap" id="puestosWrap"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyUjlA-a-4NdWXJf7jk15Q9zgBVMDPEWWw9qKW518xsVQrP94H7JiflPOg8FTcwKAzLjA/exec';

const ROOMS = {
  IPC:    { label:'Sala IPC',    cap:'8 personas', equip:'Proyector Samsung' },
  NASDAQ: { label:'Sala NASDAQ', cap:'6 personas', equip:'Pantalla The Frame' }
};

// Puestos agrupados: 1-4, 5-8, 9-12, 13-16
const GRUPOS = [
  { label:'Puestos 1 – 4',  ids:['P1','P2','P3','P4']  },
  { label:'Puestos 5 – 8',  ids:['P5','P6','P7','P8']  },
  { label:'Puestos 9 – 12', ids:['P9','P10','P11','P12'] },
  { label:'Puestos 13 – 16',ids:['P13','P14','P15','P16'] }
];

let currentMode = 'salas';
let puestosConfig = [];
let refreshTimer = null;

function pad2(n){ return String(n).padStart(2,'0'); }
function todayStr(){ return new Date().toISOString().slice(0,10); }

function toggleModSw(){ document.getElementById('modSwMenu').classList.toggle('open'); }
document.addEventListener('click', e => {
  if(!document.getElementById('modSw').contains(e.target))
    document.getElementById('modSwMenu').classList.remove('open');
});

function switchMode(m){
  currentMode = m;
  document.getElementById('modSwLabel').textContent = m==='salas' ? '🏢 Salas de Juntas' : '🗂 Puestos de Trabajo';
  document.getElementById('msItemSalas').classList.toggle('active', m==='salas');
  document.getElementById('msItemPuestos').classList.toggle('active', m==='puestos');
  document.getElementById('modSwMenu').classList.remove('open');
  document.getElementById('pageTitle').textContent = m==='salas' ? 'Resumen de Salas' : 'Resumen de Puestos';
  history.replaceState(null,'',`?m=${m}`);
  startRefresh();
}

// ── SALAS ────────────────────────────────────────────────────────────────────
async function loadSalas(){
  const today = todayStr();
  const now = new Date();
  const nowH = now.getHours() + now.getMinutes()/60;

  let bookings = [];
  try{
    const d = await fetch(`${API_URL}?date=${today}`);
    const j = await d.json();
    bookings = Array.isArray(j) ? j : (j.bookings || []);
  }catch{}

  const html = Object.entries(ROOMS).map(([rid, r]) => {
    const rbs = bookings.filter(b => b.room===rid).sort((a,b) => a.time.localeCompare(b.time));

    const curB = rbs.find(b => {
      const s = Number(b.time?.slice(0,2)), d = Math.max(1, Number(b.duration)||1);
      return s <= nowH && nowH < s+d;
    });
    const nextB = !curB ? rbs.find(b => Number(b.time?.slice(0,2)) > nowH) : null;

    let pillCls = 'pill-free', pillTxt = 'Disponible';
    if(curB){ pillCls='pill-busy'; pillTxt='En uso ahora'; }
    else if(nextB){
      const diff = Number(nextB.time?.slice(0,2)) - nowH;
      if(diff < 1){ pillCls='pill-soon'; pillTxt=`Pronto · ${nextB.time}`; }
      else { pillCls='pill-free'; pillTxt=`Libre · próx. ${nextB.time}`; }
    }

    let tlHtml = '';
    if(!rbs.length){
      tlHtml = '<div class="tl-empty">Ninguna reserva hoy</div>';
    } else {
      rbs.forEach(b => {
        const s = Number(b.time?.slice(0,2)), d = Math.max(1, Number(b.duration)||1);
        const isCur = s <= nowH && nowH < s+d;
        const isPast = (s+d) <= nowH;
        const cls = isCur ? 'current' : isPast ? 'past' : 'upcoming';
        tlHtml += `<div class="tl-row ${cls}">
          <div class="tl-time">${pad2(s)}:00 – ${pad2(s+d)}:00</div>
          <div class="tl-name">${b.advisor}</div>
        </div>`;
      });
    }

    return `<div class="sala-card">
      <div class="sala-header">
        <div>
          <div class="sala-name">${r.label}</div>
          <div class="sala-sub">${r.cap} · ${r.equip}</div>
        </div>
        <div class="sala-pill ${pillCls}">${pillTxt}</div>
      </div>
      <div class="sala-body">${tlHtml}</div>
    </div>`;
  }).join('');

  document.getElementById('salasGrid').innerHTML = html;
}

// ── PUESTOS ──────────────────────────────────────────────────────────────────
async function loadPuestos(){
  if(!puestosConfig.length){
    try{
      const d = await fetch(`${API_URL}?action=puestos`);
      const j = await d.json();
      puestosConfig = Array.isArray(j) ? j : (j.puestos || []);
    }catch{}
  }

  const today = todayStr();
  const now = new Date();
  const nowH = now.getHours() + now.getMinutes()/60;

  let bookings = [];
  try{
    const d = await fetch(`${API_URL}?action=reservasPuestos&date=${today}`);
    const j = await d.json();
    bookings = Array.isArray(j) ? j : (j.bookings || []);
  }catch{}

  function renderCard(pid){
    const cfg = puestosConfig.find(p => p.id===pid) || { id:pid, nombre:pid, disponible:false };
    const active = cfg.disponible !== false;
    const bs = bookings.filter(b => b.puesto===pid)
      .sort((a,b2) => a.time.localeCompare(b2.time));

    const curB = bs.find(b => {
      const s = Number(b.time?.slice(0,2)), d = Math.max(1, Number(b.duration)||1);
      return s <= nowH && nowH < s+d;
    });
    const pastBs = bs.filter(b => {
      const s = Number(b.time?.slice(0,2)), d = Math.max(1, Number(b.duration)||1);
      return (s+d) <= nowH;
    });
    const nextB = !curB ? bs.filter(b => Number(b.time?.slice(0,2)) > nowH)
      .sort((a,b2) => a.time.localeCompare(b2.time))[0] : null;

    let state = 'free', pillCls = 'free', pillTxt = 'Disponible';
    let advisorLine = '', timeLine = '', nextLine = '';

    if(!active){
      state='off'; pillCls='off'; pillTxt='No disponible';
    } else if(curB){
      state='busy'; pillCls='busy'; pillTxt='En uso';
      const s=Number(curB.time?.slice(0,2)), d=Math.max(1,Number(curB.duration)||1);
      advisorLine=curB.advisor; timeLine=`${pad2(s)}:00 – ${pad2(s+d)}:00`;
    } else if(nextB){
      const s=Number(nextB.time?.slice(0,2)), d=Math.max(1,Number(nextB.duration)||1);
      const diff=s-nowH;
      if(diff<1){ state='soon'; pillCls='soon'; pillTxt='Próxima <1h'; }
      advisorLine=nextB.advisor; timeLine=`${pad2(s)}:00 – ${pad2(s+d)}:00`;
    }

    return `<div class="puesto-card state-${state}">
      <div class="p-id">${cfg.nombre||pid}</div>
      <span class="p-pill ${pillCls}">${pillTxt}</span>
      ${advisorLine?`<div class="p-advisor">${advisorLine}</div>`:''}
      ${timeLine?`<div class="p-time">${timeLine}</div>`:''}
    </div>`;
  }

  const wrap = document.getElementById('puestosWrap');
  wrap.innerHTML = GRUPOS.map(g => `
    <div class="puestos-group">
      <div class="group-label">${g.label}</div>
      <div class="puestos-row">${g.ids.map(renderCard).join('')}</div>
    </div>
  `).join('');
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
async function refresh(){
  document.getElementById('loadingR').style.display='none';
  if(currentMode==='salas'){
    document.getElementById('viewSalas').style.display='';
    document.getElementById('viewPuestos').style.display='none';
    await loadSalas();
  } else {
    document.getElementById('viewPuestos').style.display='';
    document.getElementById('viewSalas').style.display='none';
    await loadPuestos();
  }
  const now = new Date();
  document.getElementById('refreshInfo').textContent =
    `Actualizado: ${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  document.getElementById('dateBadge').textContent =
    now.toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long'});
}

function startRefresh(){
  if(refreshTimer) clearInterval(refreshTimer);
  refresh();
  refreshTimer = setInterval(refresh, 5*60*1000);
}

window.addEventListener('DOMContentLoaded',()=>{
  const m = new URLSearchParams(location.search).get('m') || 'salas';
  if(m==='puestos'){
    currentMode='puestos';
    document.getElementById('modSwLabel').textContent='🗂 Puestos de Trabajo';
    document.getElementById('msItemSalas').classList.remove('active');
    document.getElementById('msItemPuestos').classList.add('active');
    document.getElementById('pageTitle').textContent='Resumen de Puestos';
  }
  startRefresh();
});
</script>
</body>
</html>
